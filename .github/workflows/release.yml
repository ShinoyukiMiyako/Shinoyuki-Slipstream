name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: 仅构建 + 校验, 不创建 release (jar 作为 workflow artifact 下载)'
        type: boolean
        default: false
      prerelease:
        description: '预发布: 标记为 pre-release (测试版, 不作为 Latest 推给用户)'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 需要完整 tag 历史用于 "tag 已存在" 守卫
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read mod version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2-)
          if [ -z "$VERSION" ]; then
            echo "::error::mod_version not found in gradle.properties"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected mod_version: $VERSION"

      - name: Verify tag and release do not exist yet
        if: inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists locally. Bump mod_version in gradle.properties before publishing."
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists on GitHub."
            exit 1
          fi

      - name: Verify release notes file exists
        id: notes
        run: |
          NOTES_FILE="release-notes/${{ steps.version.outputs.tag }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Release notes not found at $NOTES_FILE. Create the file (matching the tag) before triggering."
            exit 1
          fi
          # 英文发行说明供 Modrinth 发布用 (面向国际用户); 缺失则提前失败, 不让发版半途 (GitHub release 已建) 才炸。
          EN_NOTES="release-notes/${{ steps.version.outputs.tag }}.en.md"
          if [ ! -f "$EN_NOTES" ]; then
            echo "::error::English release notes not found at $EN_NOTES (required for the Modrinth publish step)."
            exit 1
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Build Forge 1.20.1 mod jar
        # 单模块工程 (settings.gradle 无 include 子模块), 直接 ./gradlew build。
        # build.gradle 里 tasks.build.dependsOn('jarJar'), 故 build 会一并产出自包含 fat jar。
        run: ./gradlew build --no-daemon

      - name: Verify jar artifact
        id: jar
        run: |
          # 必须发自包含 fat jar (-all): 内嵌 zstd-jni 各平台 native, 否则真服首次 zstd 调用
          # 即 UnsatisfiedLinkError (native 库未打进 jar)。普通 thin jar (无 -all) 仅供编译期消费,
          # 绝不作为发布产物。
          JAR="build/libs/slipstream-${{ steps.version.outputs.version }}-all.jar"
          if [ ! -f "$JAR" ]; then
            echo "::error::Expected fat jar not found: $JAR"
            ls -la build/libs/ || true
            exit 1
          fi
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "Built: $JAR ($(du -h "$JAR" | cut -f1))"

      - name: Upload jar as workflow artifact (dry-run only)
        if: inputs.dry_run == true
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-${{ steps.version.outputs.version }}
          path: ${{ steps.jar.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: inputs.dry_run == false
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Slipstream ${{ steps.version.outputs.tag }} — Forge 1.20.1 网络包优化
          body_path: ${{ steps.notes.outputs.path }}
          files: ${{ steps.jar.outputs.path }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ inputs.prerelease }}

      # 同步发布到 Modrinth (项目 slug slipstream)。发的是同一个自包含 fat jar + 同一份发行说明。
      # version-type 跟随 prerelease 勾选: 预发布 -> beta 通道, 正式 -> release 通道。
      # env.MODRINTH_TOKEN 为空时整步跳过 (fork 或未配 secret 不会让发版失败)。
      # 注意: Slipstream 的 Modrinth 项目可能尚未创建, 未配 MODRINTH_TOKEN secret 时本步自动跳过。
      - name: Publish to Modrinth
        if: inputs.dry_run == false && env.MODRINTH_TOKEN != ''
        uses: Kir-Antipov/mc-publish@v3
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        with:
          modrinth-id: slipstream
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.jar.outputs.path }}
          name: Slipstream ${{ steps.version.outputs.tag }}
          version: ${{ steps.version.outputs.version }}
          version-type: ${{ inputs.prerelease && 'beta' || 'release' }}
          # Modrinth 面向国际用户, changelog 用英文 .en.md (GitHub release 正文仍用中文 .md)。
          changelog-file: release-notes/${{ steps.version.outputs.tag }}.en.md
          loaders: forge
          game-versions: 1.20.1
